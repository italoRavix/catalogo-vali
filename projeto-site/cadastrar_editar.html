<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Item | Vali</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/cadastro_item.css">
</head>

<body>
    <main id="main-crude-item">
        
        <div id="container-crude-item">
            <!-- Seção de Cadastro  de Item-->
            <section id="secao-crude-item">
                <h2>Insira o ID ou uma palavra chave.</h2>
                
                <form id="form-editar-cadastro-item">
                    <input type="text" id="busca-item-para-edicao" name="busca-item-para-edicao" placeholder="ID ou Palavra Chave" required>
                    <button type="submit">Editar</button>
                </form>

                <div id="linha-divisoria-crude">
                    <hr>
                </div>

                <form id="form-cadastrar-novo-item">
                    <button type="submit">Cadastrar Novo Local</button>
                </form>                
            </section>
        </div>

        <!-- Elemento Visual -->
        <img src="assets/img/garoto_com_celular_sem_fundo_adobe.png" 
             id="imagem-item-cadastro" 
             alt="Ilustração de um garoto usando celular">

    </main>

    <script src="js/footer.js"></script>
</body>
</html>
